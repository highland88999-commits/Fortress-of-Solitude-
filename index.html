<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olympus | Personal Fortress Master</title>
    <style>
        :root { 
            --cyan: #00ffff; 
            --bg: rgba(0, 5, 10, 0.98); 
            --neon-cyan: #00ffff;
            --panel-dark: rgba(2, 6, 14, 0.97);
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        #bottom-bar {
            pointer-events: auto; width: 92%; max-width: 700px; margin: 0 auto 25px auto;
            background: linear-gradient(180deg, rgba(0,255,255,0.08) 0%, var(--bg) 100%);
            border: 1px solid rgba(0,255,255,0.4); border-radius: 40px;
            padding: 12px 25px; display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(25px); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .btn {
            background: rgba(0,0,0,0.6); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 12px 22px; border-radius: 30px; cursor: pointer; font-size: 10px;
            text-transform: uppercase; font-weight: 800; letter-spacing: 1px; transition: 0.3s;
        }
        .btn:hover { box-shadow: 0 0 20px var(--cyan); background: rgba(0,255,255,0.2); }

        #popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg); border: 1px solid var(--cyan);
            padding: 35px; border-radius: 25px; text-align: center;
            display: none; pointer-events: auto; z-index: 50;
            box-shadow: 0 0 100px rgba(0,255,255,0.2);
        }

        input[type="text"] {
            background: none; border: none; border-bottom: 2px solid var(--cyan);
            color: white; font-size: 1.6em; text-align: center; margin-bottom: 25px; outline: none; width: 100%;
        }

        #tooltip {
            position: fixed; pointer-events: none; display: none;
            color: var(--cyan); text-shadow: 0 0 15px var(--cyan);
            font-size: 14px; z-index: 100; font-weight: bold; letter-spacing: 1px;
        }

        /* MANDATORY AUTHENTICATION SHIELD STYLING */
        #auth-gateway {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        #starfield-matrix-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001226 0%, #000000 100%);
            opacity: 0.7;
        }

        .terminal-card {
            position: relative; width: 90%; max-width: 460px;
            background: var(--panel-dark); border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 24px; padding: 45px 35px; text-align: center;
            backdrop-filter: blur(20px); box-shadow: 0 0 80px rgba(0, 255, 255, 0.08);
        }

        .neon-brand {
            color: #fff; font-size: 2.4em; font-weight: 800; letter-spacing: 5px;
            margin: 0 0 8px 0; text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan);
        }

        .matrix-subtitle {
            color: var(--neon-cyan); font-size: 10px; letter-spacing: 2px;
            opacity: 0.8; margin-bottom: 30px; line-height: 1.6;
        }

        .glow-divider {
            border: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            margin-bottom: 35px;
        }

        .auth-actions { display: flex; flex-direction: column; gap: 16px; }

        .auth-btn {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 255, 255, 0.3);
            color: #fff; padding: 16px 24px; border-radius: 12px; font-size: 12px;
            font-weight: 700; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .auth-btn:hover {
            border-color: var(--neon-cyan); background: rgba(0, 255, 255, 0.06);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2); transform: translateY(-2px);
        }

        .facebook-gate { border-color: rgba(24, 119, 242, 0.4); }
        .facebook-gate:hover { border-color: #1877f2; background: rgba(24, 119, 242, 0.1); box-shadow: 0 0 25px rgba(24, 119, 242, 0.25); }

        #auth-status-log {
            margin-top: 25px; font-size: 11px; color: #ff00ff; 
            letter-spacing: 1.5px; text-transform: uppercase; display: none;
        }

        .footer-legal {
            margin-top: 45px; font-size: 9px; color: rgba(255, 255, 255, 0.25);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="tooltip">SCANNING...</div>
    <input type="file" id="hologram-upload" style="display:none" accept="image/*,video/*">

    <div id="auth-gateway">
        <div id="starfield-matrix-bg"></div>
        <div class="terminal-card">
            <h1 class="neon-brand">OLYMPUS CORE</h1>
            <p class="matrix-subtitle">MANDATORY LINK REQUIRED TO INITIALIZE VAULT ENCLOSURE</p>
            <hr class="glow-divider">
            
            <div class="auth-actions">
                <button class="auth-btn google-gate" onclick="executeSecureAuth('google')">
                    <span class="btn-icon">🌐</span> Synchronize Google Identity
                </button>
                <button class="auth-btn facebook-gate" onclick="executeSecureAuth('facebook')">
                    <span class="btn-icon">🔷</span> Synchronize Facebook Profile
                </button>
            </div>
            
            <div id="auth-status-log">CONNECTING TO SECURE SUBSURFACE CHANNELS...</div>
            <div class="footer-legal">OLYMPUS LLC // DATA FRAGMENTATION HUB © 2026</div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="popup">
            <input type="text" id="node-name" value="CRYSTAL_NODE">
            <button class="btn" style="width:100%; margin-bottom:20px;">Upload to Olympus</button>
            <span style="font-size:10px; letter-spacing:3px; color:var(--cyan);">ENERGY SPECTRUM</span>
            <input type="color" id="color-picker" value="#00ffff" style="width:100%; height:50px; border:none; background:none; cursor:pointer; margin-top:10px;">
            <br><br>
            <button class="btn" onclick="saveAndClose()" style="width:100%;">Sync Matrix</button>
        </div>

        <div id="bottom-bar">
            <button class="btn" onclick="spawnCrystal()">Add Crystal</button>
            <div style="text-align:center; flex:1; padding: 0 20px;">
                <div style="font-size: 9px; color: var(--cyan); margin-bottom:6px; letter-spacing:1px;">VAULT LOAD: 1.2 / 2.0 GB</div>
                <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px;">
                    <div style="width:60%; height:100%; background:var(--cyan); box-shadow:0 0 12px var(--cyan);"></div>
                </div>
            </div>
            <button class="btn" style="border-color:#ff00ff; color:#ff00ff;">Upgrade</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { gsap } from 'https://cdn.skypack.dev/gsap';

        // FIREBASE MASTER APP CONFIGURATION INITIALIZATION
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-app-id.firebaseapp.com",
            projectId: "your-app-id",
            storageBucket: "your-app-id.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Active Isolation State Storage Matrices
        let currentUserInstance = null;
        let activeUserVaultSegment = "";

        // Global Execution Hooks for Identity Gates
        window.executeSecureAuth = function(providerType) {
            let authProvider;
            if (providerType === 'google') {
                authProvider = new firebase.auth.GoogleAuthProvider();
            } else if (providerType === 'facebook') {
                authProvider = new firebase.auth.FacebookAuthProvider();
                authProvider.addScope('email');
            }

            firebase.auth().signInWithPopup(authProvider)
                .then(() => {
                    const statusLog = document.getElementById('auth-status-log');
                    if (statusLog) {
                        statusLog.style.display = "block";
                        statusLog.innerText = "ACCESS GRANTED. INITIALIZING QUANTUM LINK...";
                    }
                })
                .catch((err) => {
                    console.error("[GATEWAY MALFUNCTION] Handshake rejected:", err);
                    alert(`Gateway Refused Connection: ${err.message}`);
                });
        };

        // Stateful Token State Verification Observer Loop
        firebase.auth().onAuthStateChanged(async (authenticatedUser) => {
            const shieldOverlay = document.getElementById('auth-gateway');
            
            if (authenticatedUser) {
                currentUserInstance = authenticatedUser;
                activeUserVaultSegment = `vaults/${authenticatedUser.uid}`;
                
                console.log(`[OLYMPUS AUTH] Identity confirmed. Mapping instance storage lane to: ${activeUserVaultSegment}`);
                
                // Triggers database fetching array mappings from Cloud Firestore schema mapping routes
                await initializeUserFortressInstance(authenticatedUser.uid);

                gsap.to(shieldOverlay, { 
                    opacity: 0, 
                    duration: 0.7, 
                    ease: "power2.out",
                    onComplete: () => {
                        shieldOverlay.style.display = 'none';
                    }
                });
            } else {
                currentUserInstance = null;
                activeUserVaultSegment = "";
                shieldOverlay.style.display = 'flex';
                shieldOverlay.style.opacity = '1';
            }
        });

        // Database Integration Router Hook
        async function initializeUserFortressInstance(uid) {
            console.log(`[OLYMPUS DB] Syncing layout configurations for instance segment: ${uid}`);
            // This hook will pull metadata coordinates to feed rebuildCrystalsFromSchema maps later
        }

        let scene, camera, renderer, composer, controls, raycaster, mouse;
        let crystals = [];
        let crystalCount = 12;
        let selectedNode = null;
        let floorMesh, carouselGroup, innerDome, outerDome;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 20, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();
            carouselGroup = new THREE.Group();
            scene.add(carouselGroup);

            // 1. DOME WRAPPER (Layered & Transparent)
            const domeGeo = new THREE.SphereGeometry(60, 40, 40);
            outerDome = new THREE.Mesh(domeGeo, new THREE.MeshBasicMaterial({ 
                map: loader.load('assets/1776228660207.png'), 
                side: THREE.BackSide, transparent: true, opacity: 0.1 
            }));
            scene.add(outerDome);

            innerDome = new THREE.Mesh(new THREE.SphereGeometry(59, 40, 40), new THREE.MeshBasicMaterial({ 
                map: loader.load('assets/1776228269143.png'), 
                side: THREE.BackSide, transparent: true, opacity: 0.08, blending: THREE.AdditiveBlending 
            }));
            scene.add(innerDome);

            // 2. SHARP HOLOGRAPHIC FLOOR
            const floorGeo = new THREE.CircleGeometry(13, 128);
            const floorMat = new THREE.MeshBasicMaterial({ 
                color: 0x999999, transparent: true, opacity: 0.7, 
                blending: THREE.AdditiveBlending, side: THREE.DoubleSide 
            });
            floorMesh = new THREE.Mesh(floorGeo, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.userData.isFloor = true;
            scene.add(floorMesh);

            // 3. BLOOM (Optimized for Floor Clarity)
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.7, 0.5, 0.85);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // 4. NODES
            for (let i = 0; i < crystalCount; i++) createNode(i);

            // 5. CONTROLS
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI * 0.45;
            controls.minDistance = 20;
            controls.maxDistance = 60;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousemove', onHover);
            window.addEventListener('mousedown', onAction);
            window.addEventListener('resize', onResize);

            // FLOOR UPLOAD SYSTEM
            document.getElementById('hologram-upload').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                if (file.type.startsWith('video')) {
                    const video = document.createElement('video');
                    video.src = url; video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true; video.play();
                    floorMesh.material.map = new THREE.VideoTexture(video);
                } else {
                    floorMesh.material.map = loader.load(url);
                }
                floorMesh.material.color.setHex(0xffffff);
                floorMesh.material.opacity = 0.9;
                floorMesh.material.needsUpdate = true;
            });
        }

        function createNode(i) {
            const angle = (i / crystalCount) * Math.PI * 2;
            const radius = 11;
            const height = 4 + Math.random() * 1.5;
            const geo = new THREE.CylinderGeometry(0.5, 0.4, height, 6);
            const tex = new THREE.TextureLoader().load('assets/1776228269143.png');
            
            const mat = new THREE.MeshStandardMaterial({ 
                map: tex, emissive: 0x00ffff, emissiveIntensity: 0.5, metalness: 0.9, roughness: 0.1 
            });

            const node = new THREE.Mesh(geo, mat);
            node.position.set(Math.cos(angle)*radius, height/2, Math.sin(angle)*radius);
            node.userData = { name: `NODE_${(i+1).toString().padStart(2,'0')}`, color: '#00ffff' };
            carouselGroup.add(node);
            crystals.push(node);
        }

        function onHover(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(crystals);
            const tooltip = document.getElementById('tooltip');
            
            if (hits.length > 0) {
                tooltip.style.display = 'block';
                tooltip.style.left = `${e.clientX + 20}px`;
                tooltip.style.top = `${e.clientY + 20}px`;
                tooltip.innerText = hits[0].object.userData.name;
                document.body.style.cursor = 'pointer';
            } else {
                tooltip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }

        function onAction() {
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects([...crystals, floorMesh]);

            if (hits.length > 0) {
                const obj = hits[0].object;
                if (obj.userData.isFloor) {
                    document.getElementById('hologram-upload').click();
                } else {
                    selectedNode = obj;
                    gsap.to(selectedNode.position, { y: 3.5, duration: 0.4, ease: "back.out" });
                    document.getElementById('popup').style.display = 'block';
                    document.getElementById('node-name').value = selectedNode.userData.name;
                    document.getElementById('color-picker').value = selectedNode.userData.color;

                    document.getElementById('color-picker').oninput = (e) => {
                        const col = e.target.value;
                        selectedNode.material.emissive.set(col);
                        selectedNode.material.color.set(col);
                        selectedNode.userData.color = col;
                    };
                }
            } else { saveAndClose(); }
        }

        window.saveAndClose = function() {
            if(selectedNode) {
                selectedNode.userData.name = document.getElementById('node-name').value;
                gsap.to(selectedNode.position, { y: selectedNode.geometry.parameters.height / 2, duration: 0.4 });
            }
            document.getElementById('popup').style.display = 'none';
            selectedNode = null;
        }

        window.spawnCrystal = function() {
            crystalCount++;
            crystals.forEach((c, i) => {
                const angle = (i / crystalCount) * Math.PI * 2;
                gsap.to(c.position, { x: Math.cos(angle)*11, z: Math.sin(angle)*11, duration: 1 });
            });
            createNode(crystalCount - 1);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // Carousel Rotation
            carouselGroup.rotation.y += 0.0015;
            
            // Shimmering Dome
            innerDome.rotation.y -= 0.0005;
            outerDome.rotation.y += 0.0002;
            
            composer.render();
        }
    </script>
</body>
</html>
