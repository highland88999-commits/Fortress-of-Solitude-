<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olympus | Personal Fortress</title>
    <style>
        :root { --cyan: #00ffff; --bg: rgba(0, 5, 10, 0.98); --neon-cyan: #00ffff; --panel-dark: rgba(2, 6, 14, 0.97); }
        body, html { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; overscroll-behavior: none; width: 100vw; height: 100dvh; }
        #ui-layer { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; pointer-events: none; z-index: 10; display: none; flex-direction: column; justify-content: space-between; opacity: 0; }
        #top-bar { pointer-events: auto; width: 92%; max-width: 700px; margin: 25px auto 0 auto; }
        #search-input { width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.6); border: 1px solid var(--cyan); color: white; padding: 12px 20px; border-radius: 30px; font-size: 14px; outline: none; backdrop-filter: blur(10px); text-align: center; }
        #bottom-bar { pointer-events: auto; width: 92%; max-width: 800px; margin: 0 auto 25px auto; background: linear-gradient(180deg, rgba(0,255,255,0.08) 0%, var(--bg) 100%); border: 1px solid rgba(0,255,255,0.4); border-radius: 40px; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .btn { background: rgba(0,0,0,0.6); border: 1px solid var(--cyan); color: var(--cyan); padding: 12px 15px; border-radius: 30px; cursor: pointer; font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; transition: 0.3s; }
        #popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg); border: 1px solid var(--cyan); padding: 35px; border-radius: 25px; text-align: center; display: none; pointer-events: auto; z-index: 50; width: 80%; max-width: 320px; }
        #tooltip { position: fixed; pointer-events: none; display: none; color: var(--cyan); background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; border: 1px solid var(--cyan); z-index: 9999; }
        #hologram-upload { position: absolute; top: -9999px; left: -9999px; }
        #auth-gateway { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 9999; display: flex; justify-content: center; align-items: center; background: #000; }
        .terminal-card { width: 90%; max-width: 400px; background: var(--panel-dark); border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 24px; padding: 35px; text-align: center; }
        .credential-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid var(--cyan); background: rgba(0,0,0,0.4); color: white; }
        #holoframe-viewer { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: transparent; z-index: 5000; display: none; justify-content: center; align-items: center; pointer-events: none; }
        #holoframe-container { width: 90vw; height: 75dvh; max-width: 900px; background: rgba(0, 15, 25, 0.85); border: 1px solid var(--cyan); border-radius: 15px; display: flex; flex-direction: column; pointer-events: auto; backdrop-filter: blur(15px); }
        #holoframe-content { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; overflow-y: auto; flex-direction: column; }
    </style>
</head>
<body>
    <div id="tooltip"></div>
    <input type="file" id="hologram-upload">

    <div id="holoframe-viewer">
        <div id="holoframe-container">
            <div style="padding:15px; border-bottom:1px solid var(--cyan); display:flex; justify-content:space-between;">
                <span id="holo-title" style="color:var(--cyan)">FILE VIEWPORT</span>
                <button class="btn" onclick="closeHoloframe()">✕ CLOSE</button>
            </div>
            <div id="holoframe-content"></div>
        </div>
    </div>

    <div id="auth-gateway">
        <div class="terminal-card">
            <h1 class="neon-brand">OLYMPUS</h1>
            <input type="text" id="auth-email" class="credential-input" placeholder="Email">
            <input type="password" id="auth-password" class="credential-input" placeholder="Password">
            <button class="btn" style="width:100%" onclick="executeSecureAuth('email-login')">Enter Vault</button>
            <button class="btn" style="width:100%; margin-top:10px" onclick="executeSecureAuth('google')">Google Identity</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="top-bar"><input type="text" id="search-input" placeholder="Search vault..."></div>
        <div id="popup">
            <input type="text" id="node-name" style="width:100%; padding:10px; border-radius:10px;">
            <button class="btn" style="width:100%; margin:10px 0;" onclick="triggerCrystalUpload()">Upload File</button>
            <div id="popup-filled-state" style="display:none; gap:10px;"><button class="btn" onclick="viewActiveCrystal()">View</button></div>
            <button class="btn" onclick="saveAndClose()" style="width:100%">Save</button>
        </div>
        <div id="bottom-bar">
            <button class="btn" onclick="spawnCrystal()">Add</button>
            <button class="btn" onclick="triggerFloorUpload()">Set Floor</button>
            <button class="btn" id="floor-enlarge-btn" style="display:none" onclick="openFloorInHoloframe()">Enlarge View</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { gsap } from 'https://cdn.skypack.dev/gsap';

        const firebaseConfig = {
            apiKey: "AIzaSyBpGY2CfT3jLRiu7HDfwpwaNUkaMC-dRi4",
            authDomain: "fortress-of-solitude-aed9e.firebaseapp.com",
            projectId: "fortress-of-solitude-aed9e",
            storageBucket: "fortress-of-solitude-aed9e.firebasestorage.app",
            messagingSenderId: "741554663154",
            appId: "1:741554663154:web:54c8eebc07b3c4b3fe2a6b",
            measurementId: "G-BD90W5BPLK"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null, selectedNode = null, floorVideoObj = null;

        firebase.auth().onAuthStateChanged(user => {
            if(user) { currentUser = user; document.getElementById('ui-layer').style.display = 'flex'; gsap.to('#ui-layer', {opacity:1}); document.getElementById('auth-gateway').style.display = 'none'; initScene(); }
            else { document.getElementById('auth-gateway').style.display = 'flex'; }
        });

        window.executeSecureAuth = (type) => {
            if(type==='google') firebase.auth().signInWithRedirect(new firebase.auth.GoogleAuthProvider());
            else firebase.auth().signInWithEmailAndPassword(document.getElementById('auth-email').value, document.getElementById('auth-password').value).catch(e => alert(e.message));
        };

        window.closeHoloframe = () => { 
            document.getElementById('holoframe-viewer').style.display = 'none'; 
            if(floorVideoObj) floorVideoObj.play(); 
        };

        window.openFloorInHoloframe = () => {
            if(floorVideoObj) floorVideoObj.pause();
            document.getElementById('holoframe-viewer').style.display = 'flex';
        };

        function report(msg) { const tt = document.getElementById('tooltip'); tt.innerText = msg; tt.style.display = 'block'; }

        async function stagePayloadCompression(file) {
            report("UPLOADING...");
            try {
                const ref = storage.ref(`vaults/${currentUser.uid}/${Date.now()}_${file.name}`);
                await ref.put(file);
                report("UPLOAD COMPLETE");
                setTimeout(() => document.getElementById('tooltip').style.display='none', 2000);
            } catch(e) { report("ERROR: " + e.message); }
        }

        function initScene() { 
            // Three.js setup (scene, camera, renderer, etc.)
            // IMPORTANT: Ensure your animate() loop is called here.
            animate();
        }
        function animate() { requestAnimationFrame(animate); }
        window.saveAndClose = () => { document.getElementById('popup').style.display = 'none'; };
        window.triggerCrystalUpload = () => { document.getElementById('hologram-upload').click(); };
        window.triggerFloorUpload = () => { document.getElementById('hologram-upload').click(); };
        window.spawnCrystal = () => {};
        window.viewActiveCrystal = () => {};
        window.downloadActiveCrystal = () => {};
    </script>
</body>
</html>
