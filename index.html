<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olympus | Personal Fortress</title>
    <style>
        :root { 
            --cyan: #00ffff; 
            --bg: rgba(0, 5, 10, 0.98); 
            --neon-cyan: #00ffff;
            --panel-dark: rgba(2, 6, 14, 0.97);
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        #top-bar {
            pointer-events: auto; width: 92%; max-width: 700px; margin: 25px auto 0 auto;
        }

        #search-input {
            width: 100%; box-sizing: border-box; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid var(--cyan); color: white; padding: 12px 20px; 
            border-radius: 30px; font-size: 14px; outline: none; 
            backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            text-align: center; font-family: inherit; letter-spacing: 1px;
        }
        #search-input::placeholder { color: rgba(0, 255, 255, 0.5); text-transform: uppercase; font-size: 12px;}

        #bottom-bar {
            pointer-events: auto; width: 92%; max-width: 700px; margin: 0 auto 25px auto;
            background: linear-gradient(180deg, rgba(0,255,255,0.08) 0%, var(--bg) 100%);
            border: 1px solid rgba(0,255,255,0.4); border-radius: 40px;
            padding: 12px 25px; display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(25px); box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            gap: 10px;
        }

        .btn {
            background: rgba(0,0,0,0.6); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 12px 18px; border-radius: 30px; cursor: pointer; font-size: 10px;
            text-transform: uppercase; font-weight: 800; letter-spacing: 1px; transition: 0.3s;
            white-space: nowrap;
        }
        .btn:hover { box-shadow: 0 0 20px var(--cyan); background: rgba(0,255,255,0.2); }

        #popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg); border: 1px solid var(--cyan);
            padding: 35px; border-radius: 25px; text-align: center;
            display: none; pointer-events: auto; z-index: 50;
            box-shadow: 0 0 100px rgba(0,255,255,0.2);
            width: 80%; max-width: 320px;
        }

        input[type="text"], input[type="password"] {
            background: rgba(0,0,0,0.4)!important; border: none; border-bottom: 2px solid var(--cyan);
            color: white!important; font-size: 1.2em; text-align: center; margin-bottom: 25px; 
            outline: none; width: 100%; z-index: 20000; position: relative;
        }

        #tooltip {
            position: fixed; pointer-events: none; display: none;
            color: var(--cyan); text-shadow: 0 0 15px var(--cyan);
            font-size: 14px; z-index: 100; font-weight: bold; letter-spacing: 1px;
        }

        #hologram-upload {
            position: absolute; top: -9999px; left: -9999px; visibility: hidden; pointer-events: none;
        }

        #auth-gateway {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif;
        }

        #starfield-matrix-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001226 0%, #000000 100%);
            opacity: 0.7;
        }

        .terminal-card {
            position: relative; width: 90%; max-width: 400px;
            background: var(--panel-dark); border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 24px; padding: 35px 25px; text-align: center;
            backdrop-filter: blur(20px); box-shadow: 0 0 80px rgba(0, 255, 255, 0.08);
            z-index: 10001;
        }

        .neon-brand {
            color: #fff; font-size: 2.2em; font-weight: 800; letter-spacing: 4px;
            margin: 0 0 8px 0; text-shadow: 0 0 20px var(--neon-cyan);
        }

        .matrix-subtitle {
            color: var(--neon-cyan); font-size: 10px; letter-spacing: 2px;
            opacity: 0.8; margin-bottom: 25px; line-height: 1.6;
        }

        .auth-actions { display: flex; flex-direction: column; gap: 12px; }

        .auth-btn {
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 255, 255, 0.3);
            color: #fff; padding: 14px 20px; border-radius: 12px; font-size: 12px;
            font-weight: 700; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .auth-btn:hover { border-color: var(--neon-cyan); background: rgba(0, 255, 255, 0.1); }

        .credential-fields { display: flex; flex-direction: column; width: 100%; }

        .credential-input {
            width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.4)!important; 
            border: 1px solid rgba(0,255,255,0.2)!important; color: white!important; 
            font-size: 13px!important; text-align: left!important; padding: 12px!important; 
            margin-bottom: 12px!important; outline: none; border-radius: 8px!important;
            z-index: 20000; position: relative;
        }
        .credential-input::placeholder { color: rgba(255,255,255,0.4); text-transform: none; }

        #auth-status-log {
            margin-top: 20px; font-size: 11px; color: #ff00ff; 
            letter-spacing: 1px; text-transform: uppercase; display: none;
        }

        #holoframe-viewer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 3, 8, 0.92); z-index: 5000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(25px);
        }
        #holoframe-container {
            width: 90vw; height: 85vh; max-width: 1000px;
            background: rgba(0, 20, 35, 0.6); border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 15px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 0 100px rgba(0,255,255,0.15);
        }
        #holoframe-header {
            padding: 15px 20px; border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 10, 20, 0.8);
        }
        #holo-title { color: #0ff; font-size: 11px; font-weight: bold; letter-spacing: 2px; }
        #holoframe-content { flex: 1; padding: 20px; display: flex; justify-content: center; align-items: center; overflow: auto; }
        #holoframe-content img, #holoframe-content video { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
        #holoframe-content iframe { width: 100%; height: 100%; border: none; background: white; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="tooltip">SCANNING...</div>
    <input type="file" id="hologram-upload">

    <div id="holoframe-viewer" onclick="closeHoloframe()">
        <div id="holoframe-container" onclick="event.stopPropagation()">
            <div id="holoframe-header">
                <span id="holo-title">FILE VIEWER</span>
                <button class="btn" style="padding: 5px 10px;" onclick="closeHoloframe()">✕</button>
            </div>
            <div id="holoframe-content"></div>
        </div>
    </div>

    <div id="auth-gateway">
        <div id="starfield-matrix-bg"></div>
        <div class="terminal-card">
            <h1 class="neon-brand">OLYMPUS</h1>
            <p class="matrix-subtitle">PLEASE LOG IN TO ACCESS YOUR VAULT</p>
            
            <div class="auth-actions">
                <button class="auth-btn" onclick="executeSecureAuth('google')">
                    🌐 Continue with Google
                </button>
                
                <div style="margin: 10px 0; font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px;">OR USE EMAIL</div>
                
                <div class="credential-fields">
                    <input type="text" id="auth-email" class="credential-input" placeholder="Email Address">
                    <input type="password" id="auth-password" class="credential-input" placeholder="Password" style="margin-bottom: 20px!important;">
                    
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" style="flex: 1; border-radius: 12px;" onclick="executeSecureAuth('email-login')">Log In</button>
                        <button class="btn" style="flex: 1; border-radius: 12px; border-color: #ff00ff; color: #ff00ff;" onclick="executeSecureAuth('email-register')">Register</button>
                    </div>
                </div>
            </div>
            
            <div id="auth-status-log">CONNECTING...</div>
        </div>
    </div>

    <div id="ui-layer">
        <div id="top-bar">
            <input type="text" id="search-input" placeholder="Search your vault...">
        </div>

        <div id="popup">
            <input type="text" id="node-name" value="CRYSTAL_NODE" style="font-size: 1.2em;">
            <button class="btn" style="width:100%; margin-bottom:20px;" onclick="triggerCrystalUpload()">Upload File to Crystal</button>
            <span style="font-size:10px; letter-spacing:3px; color:var(--cyan);">CRYSTAL COLOR</span>
            <input type="color" id="color-picker" value="#00ffff" style="width:100%; height:50px; border:none; background:none; cursor:pointer; margin-top:10px;">
            <br><br>
            <button class="btn" onclick="saveAndClose()" style="width:100%;">Save Changes</button>
        </div>

        <div id="bottom-bar">
            <div style="display: flex; flex-direction: column; gap: 8px;">
                <button class="btn" onclick="spawnCrystal()">Add Crystal</button>
                <button class="btn" onclick="triggerFloorUpload()" style="border-color: #aaa; color: #aaa;">Set Floor Image</button>
            </div>
            
            <div style="text-align:center; flex:1; padding: 0 15px;">
                <div id="hud-capacity-text" style="font-size: 9px; color: var(--cyan); margin-bottom:6px; letter-spacing:1px;">STORAGE: 0.00 / 2000.00 MB</div>
                <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px;">
                    <div id="hud-capacity-bar" style="width:0%; height:100%; background:var(--cyan); transition: width 0.5s;"></div>
                </div>
            </div>
            <button class="btn" style="border-color:#ff00ff; color:#ff00ff;">Upgrade</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { gsap } from 'https://cdn.skypack.dev/gsap';

        const firebaseConfig = {
            apiKey: "AIzaSyBpGY2CfT3jLRiu7HDfwpwaNUkaMC-dRi4",
            authDomain: "fortress-of-solitude-aed9e.firebaseapp.com",
            projectId: "fortress-of-solitude-aed9e",
            storageBucket: "fortress-of-solitude-aed9e.firebasestorage.app",
            messagingSenderId: "741554663154",
            appId: "1:741554663154:web:54c8eebc07b3c4b3fe2a6b",
            measurementId: "G-BD90W5BPLK"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Prevent click-through to scene for all UI inputs
        ['auth-email', 'auth-password', 'node-name', 'search-input'].forEach(id => {
            const el = document.getElementById(id);
            if(el) { 
                el.addEventListener('mousedown', e => e.stopPropagation()); 
                el.addEventListener('touchstart', e => e.stopPropagation()); 
            }
        });

        let currentUserInstance = null;
        let activeUserVaultSegment = "";
        let uploadTarget = null; // Tracks if we are uploading to 'floor' or 'crystal'

        window.executeSecureAuth = function(routeType) {
            const statusLog = document.getElementById('auth-status-log');
            if (statusLog) statusLog.style.display = "block";

            if (routeType === 'google') {
                const authProvider = new firebase.auth.GoogleAuthProvider();
                if (statusLog) statusLog.innerText = "Redirecting to Google...";
                firebase.auth().signInWithRedirect(authProvider)
                    .catch((err) => {
                        alert(`Error: ${err.message}`);
                        if (statusLog) statusLog.style.display = "none";
                    });
            } else {
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                
                if (!email || !password) {
                    if (statusLog) statusLog.style.display = "none";
                    return alert("Please enter both an email and password.");
                }

                if (routeType === 'email-login') {
                    if (statusLog) statusLog.innerText = "Logging in...";
                    firebase.auth().signInWithEmailAndPassword(email, password)
                        .catch((err) => {
                            let msg = err.message;
                            if (err.code === 'auth/invalid-credential') msg = "Invalid email or password.";
                            alert(msg);
                            if (statusLog) statusLog.style.display = "none";
                        });

                } else if (routeType === 'email-register') {
                    if (statusLog) statusLog.innerText = "Creating your account...";
                    firebase.auth().createUserWithEmailAndPassword(email, password)
                        .catch((err) => {
                            alert(`Error: ${err.message}`);
                            if (statusLog) statusLog.style.display = "none";
                        });
                }
            }
        };

        // When a user successfully logs in, this triggers immediately.
        firebase.auth().onAuthStateChanged(async (authenticatedUser) => {
            const shieldOverlay = document.getElementById('auth-gateway');
            
            if (authenticatedUser) {
                currentUserInstance = authenticatedUser;
                activeUserVaultSegment = `vaults/${authenticatedUser.uid}`;
                
                // Hide the login screen gracefully
                gsap.to(shieldOverlay, { 
                    opacity: 0, duration: 0.5, ease: "power2.out",
                    onComplete: () => { shieldOverlay.style.display = 'none'; }
                });

                await initializeUserFortressInstance(authenticatedUser.uid);
            } else {
                currentUserInstance = null;
                activeUserVaultSegment = "";
                shieldOverlay.style.display = 'flex';
                shieldOverlay.style.opacity = '1';
            }
        });

        async function initializeUserFortressInstance(uid) {
            const docRef = db.collection("fortresses").doc(uid);
            try {
                const doc = await docRef.get();
                if (doc.exists) {
                    const data = doc.data();
                    window.rebuildCrystalsFromSchema(data.crystalMatrix || []);
                    window.calculateHUDQuota(data.crystalMatrix || []);
                } else {
                    const starterMatrix = [];
                    for (let i = 0; i < 12; i++) {
                        starterMatrix.push({
                            id: `node_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
                            name: `Crystal ${i+1}`,
                            color: "#00ffff",
                            height: 4 + Math.random() * 1.5,
                            fileStorageKey: "", 
                            rawSize: 0
                        });
                    }
                    await docRef.set({ crystalMatrix: starterMatrix });
                    window.rebuildCrystalsFromSchema(starterMatrix);
                    window.calculateHUDQuota(starterMatrix);
                }
            } catch (err) {
                console.error("Database sync failed:", err);
            }
        }

        let scene, camera, renderer, composer, controls, raycaster, mouse;
        let crystals = [];
        let crystalCount = 12;
        let selectedNode = null;
        let floorMesh, carouselGroup, innerDome, outerDome;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 15, 35); // Adjusted angle to ensure crystals are visible

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();
            carouselGroup = new THREE.Group();
            scene.add(carouselGroup);

            const domeGeo = new THREE.SphereGeometry(60, 40, 40);
            outerDome = new THREE.Mesh(domeGeo, new THREE.MeshBasicMaterial({ 
                map: loader.load('assets/1776228660207.png'), side: THREE.BackSide, transparent: true, opacity: 0.1 
            }));
            scene.add(outerDome);

            innerDome = new THREE.Mesh(new THREE.SphereGeometry(59, 40, 40), new THREE.MeshBasicMaterial({ 
                map: loader.load('assets/1776228269143.png'), side: THREE.BackSide, transparent: true, opacity: 0.08, blending: THREE.AdditiveBlending 
            }));
            scene.add(innerDome);

            const floorGeo = new THREE.CircleGeometry(15, 128);
            const floorMat = new THREE.MeshBasicMaterial({ 
                color: 0x555555, transparent: true, opacity: 0.5, 
                blending: THREE.AdditiveBlending, side: THREE.DoubleSide 
            });
            floorMesh = new THREE.Mesh(floorGeo, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            scene.add(floorMesh);

            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.7, 0.5, 0.85);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI * 0.48;
            controls.minDistance = 10;
            controls.maxDistance = 50;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousemove', onHover);
            window.addEventListener('mousedown', onAction);
            window.addEventListener('touchstart', onAction, {passive: false});
            window.addEventListener('resize', onResize);

            // SEARCH BAR LOGIC
            document.getElementById('search-input').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                crystals.forEach(c => {
                    if (c.userData.name.toLowerCase().includes(term)) {
                        c.material.opacity = 1;
                        c.material.transparent = false;
                    } else {
                        c.material.opacity = 0.15;
                        c.material.transparent = true;
                    }
                });
            });

            // FILE UPLOAD ROUTER
            document.getElementById('hologram-upload').addEventListener('change', function(e) {
                if (e.target.files.length === 0) return;
                
                if (uploadTarget === 'floor') {
                    const file = e.target.files[0];
                    const url = URL.createObjectURL(file);
                    if (file.type.startsWith('video')) {
                        const video = document.createElement('video');
                        video.src = url; video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true; video.play();
                        floorMesh.material.map = new THREE.VideoTexture(video);
                    } else {
                        floorMesh.material.map = loader.load(url);
                    }
                    floorMesh.material.color.setHex(0xffffff);
                    floorMesh.material.opacity = 0.9;
                    floorMesh.material.needsUpdate = true;
                } else if (uploadTarget === 'crystal' && selectedNode) {
                    stagePayloadCompression(e.target.files[0]);
                }
                
                // Reset target
                uploadTarget = null;
                e.target.value = ""; // clear input
            });
        }

        window.rebuildCrystalsFromSchema = function(schema) {
            crystals.forEach(c => carouselGroup.remove(c));
            crystals = [];
            crystalCount = schema.length;

            schema.forEach((nodeData, i) => {
                const angle = (i / crystalCount) * Math.PI * 2;
                const radius = 11;
                const geo = new THREE.CylinderGeometry(0.5, 0.4, nodeData.height, 6);
                const tex = new THREE.TextureLoader().load('assets/1776228269143.png');
                const mat = new THREE.MeshStandardMaterial({ 
                    map: tex, emissive: new THREE.Color(nodeData.color), 
                    emissiveIntensity: 0.5, metalness: 0.9, roughness: 0.1 
                });
                const node = new THREE.Mesh(geo, mat);
                node.position.set(Math.cos(angle) * radius, nodeData.height / 2, Math.sin(angle) * radius);
                node.userData = { ...nodeData, index: i };
                carouselGroup.add(node);
                crystals.push(node);
            });
        };

        window.triggerFloorUpload = function() {
            uploadTarget = 'floor';
            document.getElementById('hologram-upload').click();
        };

        window.triggerCrystalUpload = function() {
            uploadTarget = 'crystal';
            document.getElementById('hologram-upload').click();
        };

        function onHover(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            // Only intersect crystals, NEVER the floor
            const hits = raycaster.intersectObjects(crystals);
            const tooltip = document.getElementById('tooltip');
            
            if (hits.length > 0 && !selectedNode) {
                tooltip.style.display = 'block';
                tooltip.style.left = `${e.clientX + 20}px`;
                tooltip.style.top = `${e.clientY + 20}px`;
                tooltip.innerText = hits[0].object.userData.name;
                document.body.style.cursor = 'pointer';
            } else {
                if(tooltip.innerText !== "DOWNLOADING...") tooltip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }

        function onAction(e) {
            // Ignore UI clicks entirely
            if (e.target.tagName !== 'CANVAS') return;

            if (e.touches && e.touches.length > 0) {
                mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
            } else {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            }

            raycaster.setFromCamera(mouse, camera);
            
            // ONLY check against crystals. The floor is no longer clickable.
            const hits = raycaster.intersectObjects(crystals);

            if (hits.length > 0) {
                const obj = hits[0].object;
                const storageKey = obj.userData.fileStorageKey;
                selectedNode = obj;

                if (storageKey) {
                    rematerializeNodeCore(obj);
                } else {
                    gsap.to(selectedNode.position, { y: 3.5, duration: 0.4, ease: "back.out" });
                    document.getElementById('popup').style.display = 'block';
                    document.getElementById('node-name').value = selectedNode.userData.name;
                    document.getElementById('color-picker').value = selectedNode.userData.color;

                    document.getElementById('color-picker').oninput = (ev) => {
                        const col = ev.target.value;
                        selectedNode.material.emissive.set(col);
                        selectedNode.material.color.set(col);
                        selectedNode.userData.color = col;
                    };
                }
            } else { 
                if (document.getElementById('popup').style.display === 'block') saveAndClose(); 
            }
        }

        window.saveAndClose = function() {
            if(selectedNode) {
                selectedNode.userData.name = document.getElementById('node-name').value;
                gsap.to(selectedNode.position, { y: selectedNode.geometry.parameters.height / 2, duration: 0.4 });
                
                if (currentUserInstance) {
                    db.collection("fortresses").doc(currentUserInstance.uid).get().then((doc) => {
                        let matrix = doc.data().crystalMatrix;
                        let idx = selectedNode.userData.index;
                        matrix[idx].name = selectedNode.userData.name;
                        matrix[idx].color = selectedNode.userData.color;
                        db.collection("fortresses").doc(currentUserInstance.uid).update({ crystalMatrix: matrix });
                    });
                }
            }
            document.getElementById('popup').style.display = 'none';
            selectedNode = null;
        }

        window.spawnCrystal = function() {
            crystalCount++;
            crystals.forEach((c, i) => {
                const angle = (i / crystalCount) * Math.PI * 2;
                gsap.to(c.position, { x: Math.cos(angle)*11, z: Math.sin(angle)*11, duration: 1 });
            });
            
            const angle = ((crystalCount - 1) / crystalCount) * Math.PI * 2;
            const radius = 11;
            const height = 4 + Math.random() * 1.5;
            const geo = new THREE.CylinderGeometry(0.5, 0.4, height, 6);
            const tex = new THREE.TextureLoader().load('assets/1776228269143.png');
            const mat = new THREE.MeshStandardMaterial({ map: tex, emissive: 0x00ffff, emissiveIntensity: 0.5, metalness: 0.9, roughness: 0.1 });
            const node = new THREE.Mesh(geo, mat);
            node.position.set(Math.cos(angle)*radius, height/2, Math.sin(angle)*radius);
            
            const newNodeData = {
                id: `node_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
                name: `Crystal ${crystalCount}`,
                color: '#00ffff', height: height, fileStorageKey: "", rawSize: 0, index: crystalCount - 1
            };
            node.userData = newNodeData;
            carouselGroup.add(node);
            crystals.push(node);

            if (currentUserInstance) {
                db.collection("fortresses").doc(currentUserInstance.uid).update({ crystalMatrix: firebase.firestore.FieldValue.arrayUnion(newNodeData) });
            }
        }

        async function stagePayloadCompression(file) {
            const CHUNK_SIZE = 64 * 1024; 
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
            const zip = new JSZip();

            const manifest = {
                originName: file.name, mimeType: file.type, rawSizeBytes: file.size, 
                totalFragments: totalChunks, timestamp: Date.now(), nodeId: selectedNode.userData.id
            };
            zip.file("manifest.json", JSON.stringify(manifest));

            let currentByteBound = 0;
            for (let i = 0; i < totalChunks; i++) {
                const fileSlice = file.slice(currentByteBound, currentByteBound + CHUNK_SIZE);
                const arrayBufferShard = await fileSlice.arrayBuffer();
                zip.file(`fragments/shard_${i.toString().padStart(6, '0')}.dat`, arrayBufferShard, { binary: true });
                currentByteBound += CHUNK_SIZE;
            }

            gsap.to(carouselGroup.rotation, { y: "+=5", duration: 1.5, ease: "power3.out" });
            const compressedZipBlob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 9 } });
            dispatchToVaultBypass(compressedZipBlob, manifest);
        }

        async function dispatchToVaultBypass(zipBlob, manifest) {
            try {
                const getUploadSignature = firebase.functions().httpsCallable('requestSecureUploadLink');
                const response = await getUploadSignature({ nodeId: manifest.nodeId });
                const { uploadUrl, fileStorageKey } = response.data;
                const transferResult = await fetch(uploadUrl, { method: "PUT", headers: { "Content-Type": "application/zip" }, body: zipBlob });
                
                if (!transferResult.ok) throw new Error("Upload failed to connect to storage.");
                
                finalizeNodeMetadataUpdate(fileStorageKey, manifest.originName, manifest.rawSizeBytes);
            } catch (err) {
                console.error("Upload error:", err);
                alert("Upload failed. Please try again.");
            }
        }

        function finalizeNodeMetadataUpdate(storageKey, filename, bytesize) {
            db.collection("fortresses").doc(currentUserInstance.uid).get().then((doc) => {
                let matrix = doc.data().crystalMatrix;
                let idx = selectedNode.userData.index;
                matrix[idx].fileStorageKey = storageKey;
                matrix[idx].name = filename;
                matrix[idx].rawSize = bytesize;
                db.collection("fortresses").doc(currentUserInstance.uid).update({ crystalMatrix: matrix }).then(() => {
                    window.rebuildCrystalsFromSchema(matrix);
                    window.calculateHUDQuota(matrix);
                    saveAndClose();
                });
            });
        }

        async function rematerializeNodeCore(nodeMesh) {
            const storageKey = nodeMesh.userData.fileStorageKey;
            const tooltip = document.getElementById('tooltip');
            tooltip.style.display = 'block';
            tooltip.innerText = "DOWNLOADING...";

            try {
                const getDownloadSignature = firebase.functions().httpsCallable('requestSecureDownloadLink');
                const response = await getDownloadSignature({ fileStorageKey: storageKey });
                const cloudStream = await fetch(response.data.downloadUrl);
                const blobData = await cloudStream.blob();
                const unzipped = await JSZip.loadAsync(blobData);
                const manifestRaw = await unzipped.file("manifest.json").async("string");
                const manifest = JSON.parse(manifestRaw);

                let compiledBuffers = [];
                for (let i = 0; i < manifest.totalFragments; i++) {
                    const key = `fragments/shard_${i.toString().padStart(6, '0')}.dat`;
                    compiledBuffers.push(await unzipped.file(key).async("arraybuffer"));
                }
                const reconstructedBlob = new Blob(compiledBuffers, { type: manifest.mimeType });
                tooltip.style.display = 'none';
                renderHoloframeContent(URL.createObjectURL(reconstructedBlob), manifest);
            } catch (err) {
                console.error("Download failed:", err);
                tooltip.innerText = "ERROR OPENING FILE";
                setTimeout(() => tooltip.style.display = 'none', 2000);
            }
        }

        function renderHoloframeContent(url, meta) {
            const viewer = document.getElementById('holoframe-viewer');
            const target = document.getElementById('holoframe-content');
            target.innerHTML = ""; 
            viewer.style.display = "flex";

            if (meta.mimeType.startsWith('image/')) {
                const img = document.createElement('img'); img.src = url; target.appendChild(img);
            } else if (meta.mimeType.startsWith('video/')) {
                const vid = document.createElement('video'); vid.src = url; vid.controls = true; vid.autoplay = true; vid.loop = true; target.appendChild(vid);
            } else {
                const iframe = document.createElement('iframe'); iframe.src = url; target.appendChild(iframe);
            }
        }

        window.closeHoloframe = function() { document.getElementById('holoframe-viewer').style.display = "none"; }

        window.calculateHUDQuota = function(matrix) {
            let totalBytes = 0;
            matrix.forEach(node => totalBytes += (node.rawSize || 0));
            const percentage = Math.min((totalBytes / (2000.00 * 1024 * 1024)) * 100, 100);
            document.getElementById('hud-capacity-text').innerText = `STORAGE: ${(totalBytes / (1024 * 1024)).toFixed(2)} / 2000.00 MB`;
            document.getElementById('hud-capacity-bar').style.width = `${percentage}%`;
        };

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            carouselGroup.rotation.y += 0.0015;
            innerDome.rotation.y -= 0.0005;
            outerDome.rotation.y += 0.0002;
            composer.render();
        }
    </script>
</body>
