<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olympus | Fortress of Solitude</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #hud {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 20px;
            background: rgba(0, 40, 80, 0.5); padding: 15px 30px;
            border-radius: 12px; backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.3); z-index: 10;
        }
        .btn {
            background: rgba(0, 255, 255, 0.1); border: 1px solid #0ff;
            color: #0ff; padding: 10px 18px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: rgba(0, 255, 255, 0.4); box-shadow: 0 0 20px #0ff; }
        #storage-bar { width: 180px; height: 8px; background: #111; border-radius: 4px; border: 1px solid #333; }
        #storage-fill { width: 60%; height: 100%; background: #0ff; box-shadow: 0 0 10px #0ff; }
        #crystal-popup {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 10, 20, 0.95); padding: 25px; border: 2px solid #0ff;
            display: none; text-align: center; z-index: 20; color: #fff;
        }
        input[type="text"] { background: none; border: none; border-bottom: 1px solid #0ff; color: #fff; font-size: 1.2em; text-align: center; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>

    <div id="hud">
        <button class="btn" onclick="addNewCrystal()">Add Crystal</button>
        <div style="text-align: center;">
            <div style="font-size: 10px; color: #0ff; margin-bottom: 4px;">OLYMPUS STORAGE: 1.2 / 2.0 GB</div>
            <div id="storage-bar"><div id="storage-fill"></div></div>
        </div>
        <button class="btn" style="border-color: #f0f; color: #f0f;">Upgrade</button>
        <button class="btn">My Vault</button>
    </div>

    <div id="crystal-popup">
        <input type="text" id="crystal-name" value="Crystal #1">
        <br>
        <button class="btn">Upload to Olympus</button>
        <p style="font-size: 12px; margin-top: 15px;">Set Bloom Color:</p>
        <input type="color" id="bloom-color" value="#00ffff" style="cursor:pointer; border:none; background:none; width:50px; height:50px;">
        <br><br>
        <button class="btn" onclick="closePopup()">Save & Close</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { gsap } from 'https://cdn.skypack.dev/gsap';

        let scene, camera, renderer, composer, controls, raycaster, mouse;
        let crystals = [];
        let crystalCount = 10;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            // Textures from your Assets folder
            const loader = new THREE.TextureLoader();
            const crystalTexture = loader.load('assets/1776228269143.png');
            const domeTexture = loader.load('assets/1776228660207.png');

            // Set up Bloom (Automotive Glow)
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.1;
            bloomPass.strength = 1.8;
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Fortress Dome
            const domeGeo = new THREE.SphereGeometry(25, 32, 32);
            const domeMat = new THREE.MeshBasicMaterial({ map: domeTexture, side: THREE.BackSide, transparent: true, opacity: 0.6 });
            scene.add(new THREE.Mesh(domeGeo, domeMat));

            // Create Initial Crystals
            for (let i = 0; i < crystalCount; i++) createCrystal(i);

            // Interaction
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            controls = new OrbitControls(camera, renderer.domElement);
            window.addEventListener('click', onInteract);
        }

        function createCrystal(i) {
            const angle = (i / crystalCount) * Math.PI * 2;
            const radius = 6;
            
            // Hexagonal Crystal Geometry
            const geo = new THREE.CylinderGeometry(0.6, 0.6, 4, 6);
            const loader = new THREE.TextureLoader();
            const tex = loader.load('assets/1776228269143.png');
            
            // Material 1 is the top/bottom cap, Material 2 is the side
            const mat = new THREE.MeshStandardMaterial({ 
                map: tex, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2
            });

            const crystal = new THREE.Mesh(geo, mat);
            crystal.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            crystal.userData = { name: `Crystal #${i + 1}` };
            scene.add(crystal);
            crystals.push(crystal);
        }

        function onInteract(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(crystals);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                gsap.to(target.position, { y: 1.2, duration: 0.6, ease: "back.out(1.7)" });

                document.getElementById('crystal-popup').style.display = 'block';
                document.getElementById('crystal-name').value = target.userData.name;

                document.getElementById('bloom-color').oninput = (ce) => {
                    target.material.emissive.set(ce.target.value);
                    target.material.color.set(ce.target.value);
                };
            }
        }

        window.closePopup = function() {
            document.getElementById('crystal-popup').style.display = 'none';
            crystals.forEach(c => gsap.to(c.position, { y: 0, duration: 0.5 }));
        }

        window.addNewCrystal = function() {
            crystalCount++;
            // Re-calculate positions for the carousel ring
            crystals.forEach((c, i) => {
                const angle = (i / crystalCount) * Math.PI * 2;
                gsap.to(c.position, { x: Math.cos(angle) * 6, z: Math.sin(angle) * 6, duration: 1 });
            });
            createCrystal(crystalCount - 1);
        }

        function animate() {
            requestAnimationFrame(animate);
            scene.rotation.y += 0.001; // Slow carousel rotation
            composer.render();
        }
    </script>
</body>
</html>
