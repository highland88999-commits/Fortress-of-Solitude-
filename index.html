<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olympus | Personal Fortress</title>
    <style>
        :root { --cyan: #00ffff; --bg: #00050a; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; }
        
        /* STABILIZED HUD */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        #bottom-bar {
            pointer-events: auto;
            width: 100%; max-width: 600px; margin: 0 auto 20px auto;
            background: linear-gradient(180deg, rgba(0,255,255,0.05) 0%, rgba(0,10,20,0.9) 100%);
            border: 1px solid rgba(0,255,255,0.3); border-radius: 15px;
            padding: 15px; display: flex; align-items: center; justify-content: space-around;
            backdrop-filter: blur(10px);
        }

        .btn {
            background: none; border: 1px solid var(--cyan); color: var(--cyan);
            padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 10px;
            transition: 0.3s; pointer-events: auto;
        }
        .btn:hover { box-shadow: 0 0 15px var(--cyan); background: rgba(0,255,255,0.1); }

        #storage-info { text-align: center; min-width: 120px; }
        #bar-bg { width: 100%; height: 4px; background: #111; margin-top: 5px; border-radius: 2px; }
        #bar-fill { width: 60%; height: 100%; background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }

        /* FLOATING TOOLTIP */
        #tooltip {
            position: fixed; pointer-events: none; display: none;
            color: var(--cyan); text-shadow: 0 0 8px var(--cyan);
            font-size: 12px; z-index: 100;
        }

        /* INTERACTIVE POPUP */
        #popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 5, 15, 0.95); border: 1px solid var(--cyan);
            padding: 25px; border-radius: 15px; text-align: center;
            display: none; pointer-events: auto; z-index: 50; color: white;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<body>

    <div id="tooltip">FILE_IDENTIFIED</div>

    <div id="ui-layer">
        <div id="popup">
            <input type="text" id="node-name" style="background:none; border:none; border-bottom:1px solid var(--cyan); color:white; text-align:center; margin-bottom:20px; outline:none; width:100%;">
            <br>
            <button class="btn" style="width:100%; margin-bottom:10px;">UPLOAD DATA</button>
            <input type="color" id="glow-pick" value="#00ffff" style="width:100%; height:30px; border:none; background:none; cursor:pointer;">
            <br><br>
            <button class="btn" onclick="closeInterface()" style="width:100%;">SAVE TO OLYMPUS</button>
        </div>

        <div id="bottom-bar">
            <button class="btn" onclick="spawnCrystal()">ADD CRYSTAL</button>
            <div id="storage-info">
                <div style="font-size: 8px; color: var(--cyan);">STORAGE: 1.2 / 2.0 GB</div>
                <div id="bar-bg"><div id="bar-fill"></div></div>
            </div>
            <button class="btn" style="border-color:#f0f; color:#f0f;">UPGRADE</button>
            <button class="btn">MY VAULT</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { gsap } from 'https://cdn.skypack.dev/gsap';

        let scene, camera, renderer, composer, controls, raycaster, mouse;
        let crystals = [];
        let crystalCount = 10;
        let selectedNode = null;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();
            const crystalTex = loader.load('assets/1776228269143.png');
            const domeTex = loader.load('assets/1776228660207.png');
            const floorTex = loader.load('assets/1776235626011.png');

            // TEXTURE ADAPTATION LOGIC
            [crystalTex, domeTex, floorTex].forEach(t => {
                t.wrapS = t.wrapT = THREE.RepeatWrapping;
                t.anisotropy = renderer.capabilities.getMaxAnisotropy();
            });

            // 1. DOME
            const dome = new THREE.Mesh(
                new THREE.SphereGeometry(40, 32, 32),
                new THREE.MeshBasicMaterial({ map: domeTex, side: THREE.BackSide, transparent: true, opacity: 0.3 })
            );
            scene.add(dome);

            // 2. FLOOR (STABILIZED)
            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(12, 64),
                new THREE.MeshStandardMaterial({ map: floorTex, metalness: 0.8, roughness: 0.2 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -1;
            scene.add(floor);

            // 3. BLOOM
            const renderPass = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.15;
            bloomPass.strength = 1.8;
            composer = new EffectComposer(renderer);
            composer.addPass(renderPass);
            composer.addPass(bloomPass);

            // 4. CRYSTALS
            for (let i = 0; i < crystalCount; i++) createNode(i);

            // 5. CONTROLS (SLING EFFECT)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05; // The 'sling'
            controls.enablePan = false;
            controls.maxDistance = 25;
            controls.minDistance = 8;
            controls.maxPolarAngle = Math.PI / 2.1;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousemove', onHover);
            window.addEventListener('mousedown', onAction);
            window.addEventListener('resize', onResize);
        }

        function createNode(i) {
            const angle = (i / crystalCount) * Math.PI * 2;
            const radius = 8;
            const geo = new THREE.CylinderGeometry(0.5, 0.4, 4, 6);
            const tex = new THREE.TextureLoader().load('assets/1776228269143.png');
            tex.repeat.set(1, 1);
            
            const mat = new THREE.MeshStandardMaterial({ 
                map: tex, emissive: 0x00ffff, emissiveIntensity: 0.5, metalness: 0.9, roughness: 0.1 
            });

            const node = new THREE.Mesh(geo, mat);
            node.position.set(Math.cos(angle)*radius, 1, Math.sin(angle)*radius);
            node.userData = { name: `DATA_CORE_${i+1}`, color: '#00ffff' };
            scene.add(node);
            crystals.push(node);
        }

        function onHover(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(crystals);
            
            if (hits.length > 0) {
                document.getElementById('tooltip').style.display = 'block';
                document.getElementById('tooltip').style.left = e.clientX + 10 + 'px';
                document.getElementById('tooltip').style.top = e.clientY + 10 + 'px';
                document.getElementById('tooltip').innerText = hits[0].object.userData.name;
            } else {
                document.getElementById('tooltip').style.display = 'none';
            }
        }

        function onAction() {
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(crystals);

            if (hits.length > 0) {
                selectedNode = hits[0].object;
                gsap.to(selectedNode.position, { y: 2.5, duration: 0.5, ease: "back.out" });
                document.getElementById('popup').style.display = 'block';
                document.getElementById('node-name').value = selectedNode.userData.name;
            } else {
                // CLICKED OUTSIDE - CLOSE ALL
                closeInterface();
            }
        }

        window.closeInterface = function() {
            if(selectedNode) gsap.to(selectedNode.position, { y: 1, duration: 0.5 });
            document.getElementById('popup').style.display = 'none';
            selectedNode = null;
        }

        window.spawnCrystal = function() {
            crystalCount++;
            crystals.forEach((c, i) => {
                const angle = (i / crystalCount) * Math.PI * 2;
                gsap.to(c.position, { x: Math.cos(angle)*8, z: Math.sin(angle)*8, duration: 1 });
            });
            createNode(crystalCount - 1);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necessary for damping/sling
            composer.render();
        }
    </script>
</body>
</html>
