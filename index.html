<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Olympus | Personal Fortress</title>
    <style>
        :root { --cyan: #00ffff; --bg: rgba(0, 10, 20, 0.9); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* STABILIZED HUD */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        #bottom-bar {
            pointer-events: auto; width: 100%; max-width: 650px; margin: 0 auto 30px auto;
            background: linear-gradient(180deg, rgba(0,255,255,0.1) 0%, var(--bg) 100%);
            border: 1px solid rgba(0,255,255,0.3); border-radius: 20px;
            padding: 15px 25px; display: flex; align-items: center; justify-content: space-around;
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            background: rgba(0,0,0,0.3); border: 1px solid var(--cyan); color: var(--cyan);
            padding: 10px 20px; border-radius: 30px; cursor: pointer; font-size: 11px;
            text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { box-shadow: 0 0 20px var(--cyan); background: rgba(0,255,255,0.2); }

        /* CRYSTAL OPTIONS POPUP */
        #popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bg); border: 1px solid var(--cyan);
            padding: 30px; border-radius: 20px; text-align: center;
            display: none; pointer-events: auto; z-index: 50; color: white;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        input[type="text"] {
            background: none; border: none; border-bottom: 1px solid var(--cyan);
            color: white; font-size: 1.4em; text-align: center; margin-bottom: 25px; outline: none; width: 100%;
        }

        .color-label { font-size: 10px; margin-bottom: 10px; display: block; letter-spacing: 2px; }

        /* TOOLTIP */
        #tooltip {
            position: fixed; pointer-events: none; display: none;
            color: var(--cyan); text-shadow: 0 0 10px var(--cyan);
            font-size: 14px; z-index: 100; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="tooltip">NODE_ID</div>
    
    <input type="file" id="floor-upload" style="display:none" accept="image/*">

    <div id="ui-layer">
        <div id="popup">
            <input type="text" id="node-name" value="CRYSTAL_CORE">
            <button class="btn" style="width:100%; margin-bottom:15px;">Upload File</button>
            <span class="color-label">CORE ENERGY COLOR</span>
            <input type="color" id="color-picker" value="#00ffff" style="width:100%; height:40px; border:none; background:none; cursor:pointer;">
            <br><br>
            <button class="btn" onclick="saveCrystal()" style="width:100%;">Save to Olympus</button>
        </div>

        <div id="bottom-bar">
            <button class="btn" onclick="spawnCrystal()">Add Crystal</button>
            <div style="text-align:center">
                <div style="font-size: 9px; color: var(--cyan); margin-bottom:5px;">CAPACITY: 1.2 / 2.0 GB</div>
                <div style="width:140px; height:4px; background:#111; border-radius:2px;">
                    <div style="width:60%; height:100%; background:var(--cyan); box-shadow:0 0 10px var(--cyan);"></div>
                </div>
            </div>
            <button class="btn" style="border-color:#f0f; color:#f0f;">Upgrade</button>
            <button class="btn">My Vault</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { gsap } from 'https://cdn.skypack.dev/gsap';

        let scene, camera, renderer, composer, controls, raycaster, mouse;
        let crystals = [];
        let crystalCount = 10;
        let selectedNode = null;
        let floorMesh;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 12, 18);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();

            // 1. DOME
            const domeGeo = new THREE.SphereGeometry(45, 32, 32);
            const domeMat = new THREE.MeshBasicMaterial({ 
                map: loader.load('assets/1776228660207.png'), 
                side: THREE.BackSide, 
                transparent: true, 
                opacity: 0.3 
            });
            scene.add(new THREE.Mesh(domeGeo, domeMat));

            // 2. FLOOR (CLICKABLE BACKGROUND)
            const floorGeo = new THREE.CircleGeometry(15, 64);
            const floorMat = new THREE.MeshStandardMaterial({ 
                map: loader.load('assets/1776235626011.png'),
                metalness: 0.6, roughness: 0.3 
            });
            floorMesh = new THREE.Mesh(floorGeo, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.y = -1;
            floorMesh.userData.isFloor = true;
            scene.add(floorMesh);

            // 3. CINEMATIC BLOOM
            const renderScene = new RenderPass(scene, camera);
            // Params: Resolution, Strength, Radius, Threshold
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 1.1, 0.15);
            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // 4. PARTICLES
            createParticles();

            // 5. CRYSTALS
            for (let i = 0; i < crystalCount; i++) createNode(i);

            // CONTROLS
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.04;
            controls.enablePan = false;
            controls.maxPolarAngle = Math.PI / 2.1;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            window.addEventListener('mousemove', onHover);
            window.addEventListener('mousedown', onAction);
            window.addEventListener('resize', onResize);

            // FLOOR UPLOAD LOGIC
            document.getElementById('floor-upload').addEventListener('change', function(e) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const newTex = new THREE.TextureLoader().load(event.target.result);
                    floorMesh.material.map = newTex;
                    floorMesh.material.needsUpdate = true;
                };
                reader.readAsDataURL(e.target.files[0]);
            });
        }

        function createNode(i) {
            const angle = (i / crystalCount) * Math.PI * 2;
            const radius = 9;
            const geo = new THREE.CylinderGeometry(0.6, 0.5, 4.5, 6);
            const tex = new THREE.TextureLoader().load('assets/1776228269143.png');
            
            const mat = new THREE.MeshStandardMaterial({ 
                map: tex, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.8,
                metalness: 0.9, 
                roughness: 0.1 
            });

            const node = new THREE.Mesh(geo, mat);
            node.position.set(Math.cos(angle)*radius, 1, Math.sin(angle)*radius);
            node.userData = { name: `UNNAMED_CORE_${i+1}`, color: '#00ffff' };
            scene.add(node);
            crystals.push(node);
        }

        function createParticles() {
            const pGeo = new THREE.BufferGeometry();
            const pos = new Float32Array(1000 * 3);
            for(let i=0; i<3000; i++) pos[i] = (Math.random()-0.5)*50;
            pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const pMat = new THREE.PointsMaterial({ size: 0.06, color: 0xffffff, transparent: true, opacity: 0.4 });
            scene.add(new THREE.Points(pGeo, pMat));
        }

        function onHover(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(crystals);
            const tooltip = document.getElementById('tooltip');
            
            if (hits.length > 0) {
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
                tooltip.innerText = hits[0].object.userData.name;
                document.body.style.cursor = 'pointer';
            } else {
                tooltip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        }

        function onAction() {
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects([...crystals, floorMesh]);

            if (hits.length > 0) {
                const target = hits[0].object;
                
                if (target.userData.isFloor) {
                    // Clicked the floor - Change Wallpaper
                    document.getElementById('floor-upload').click();
                } else {
                    // Clicked a crystal
                    selectedNode = target;
                    gsap.to(selectedNode.position, { y: 2.5, duration: 0.5, ease: "back.out" });
                    document.getElementById('popup').style.display = 'block';
                    document.getElementById('node-name').value = selectedNode.userData.name;
                    document.getElementById('color-picker').value = selectedNode.userData.color;

                    document.getElementById('color-picker').oninput = (e) => {
                        const col = e.target.value;
                        selectedNode.material.emissive.set(col);
                        selectedNode.material.color.set(col);
                        selectedNode.userData.color = col;
                    };
                }
            } else {
                saveCrystal(); // Clicked background - close all
            }
        }

        window.saveCrystal = function() {
            if(selectedNode) {
                selectedNode.userData.name = document.getElementById('node-name').value;
                gsap.to(selectedNode.position, { y: 1, duration: 0.5 });
            }
            document.getElementById('popup').style.display = 'none';
            selectedNode = null;
        }

        window.spawnCrystal = function() {
            crystalCount++;
            crystals.forEach((c, i) => {
                const angle = (i / crystalCount) * Math.PI * 2;
                gsap.to(c.position, { x: Math.cos(angle)*9, z: Math.sin(angle)*9, duration: 1 });
            });
            createNode(crystalCount - 1);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
